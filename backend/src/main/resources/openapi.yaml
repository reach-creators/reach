openapi: 3.0.0

info:
  title: Reach Backend API
  version: 0.0.1-SNAPSHOT
  description: |
    This is the API specification for the endpoints included in the Reach web app backend.

paths:
  /health:
    get:
      tags:
        - Health
      summary: Ping backend health
      description: Call this endpoint to check if the backend is up and running.
      operationId: checkHealth
      responses:
        '200':
          description: Backend is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HelloWorld'
        '401':
          description: Health error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HelloWorldError'
        '500':
          description: Internal server error

  /creator:
    post:
      tags:
        - Creator
      summary: Create a new creator
      description: Creates a new creator with the given details.
      operationId: createCreator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatorInput'
      responses:
        '201':
          description: Creator successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Creator'
        '400':
          description: Invalid input

components:
  schemas:
    HelloWorld:
      type: object
      description: Default health response
      properties:
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    HelloWorldError:
      type: object
      description: Health error
      properties:
        error:
          type: string
        randomNumber:
          type: number

    Niche:
      type: string
      enum:
        - BEAUTY_AND_PERSONAL_CARE
        - HEALTH
        - NUTRITION_AND_WELLNESS
        - SPORTS_AND_OUTDOOR
        - VITAMINS_MINERALS_AND_WELLNESS_SUPPLEMENTS
        - PHONES_AND_ELECTRONICS
        - FASHION_ACCESSORIES
        - FRAGRANCE
        - SKINCARE
      description: Enum representing the niche of the creator.

    CreatorInput:
      type: object
      required: [name, salesPerMonth, itemsSold, niches, region]
      properties:
        name:
          type: string
        salesPerMonth:
          type: integer
        itemsSold:
          type: integer
        niches:
          type: array
          items:
            $ref: '#/components/schemas/Niche'
        region:
          type: string

    Creator:
      title: Creator
      allOf:
        - $ref: '#/components/schemas/CreatorInput'
        - type: object
          properties:
            id:
              type: integer
